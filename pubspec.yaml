name: mesh_chat
description: Offline P2P Mesh Chat App using Bluetooth and WiFi Direct without internet connectivity.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.3.1
  nearby_connections: ^4.3.0
  flutter_blue_plus: ^1.32.4
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  image_picker: ^1.0.7
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.3
  uuid: ^4.5.0
  intl: ^0.19.0
  flutter_map: any
  latlong2: any
  geolocator: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 24

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/tiles/0/0/
    - assets/tiles/1/0/
    - assets/tiles/1/1/
    - assets/tiles/2/0/
    - assets/tiles/2/1/
    - assets/tiles/2/2/
    - assets/tiles/2/3/
